name: Release Unsigned IPA

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.0)'
        required: true

jobs:
  release:
    runs-on: macos-14

    permissions:
      contents: write   # needed to create releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Building release: $TAG"

      - name: Select Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: Resolve scheme
        id: scheme
        run: |
          SCHEME=$(xcodebuild -project ios-cloudfare-tunnel.xcodeproj -list 2>/dev/null \
            | grep -A20 'Schemes:' | grep -v 'Schemes:' | head -1 | xargs)
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT

      - name: Build archive (no signing)
        run: |
          xcodebuild \
            -project ios-cloudfare-tunnel.xcodeproj \
            -scheme "${{ steps.scheme.outputs.scheme }}" \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath $RUNNER_TEMP/app.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Package unsigned IPA
        run: |
          APP_PATH=$(find $RUNNER_TEMP/app.xcarchive -name "*.app" | head -1)
          mkdir -p $RUNNER_TEMP/ipa/Payload
          cp -r "$APP_PATH" $RUNNER_TEMP/ipa/Payload/
          cd $RUNNER_TEMP/ipa
          IPA_NAME="CloudfareTunnel-${{ steps.meta.outputs.tag }}-unsigned.ipa"
          zip -qr "../$IPA_NAME" Payload
          echo "IPA_PATH=$RUNNER_TEMP/$IPA_NAME" >> $GITHUB_ENV
          echo "IPA_NAME=$IPA_NAME" >> $GITHUB_ENV

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.meta.outputs.tag, '-') }}
          generate_release_notes: true
          files: ${{ env.IPA_PATH }}
          body: |
            ## ${{ steps.meta.outputs.tag }} — Unsigned IPA

            This is an **unsigned** build. You must sign it with your own certificate before installing on a device.

            ### Install

            1. Download `${{ env.IPA_NAME }}` below
            2. Sign with your Apple Developer / Enterprise certificate
            3. Install via Apple Configurator 2 / Sideloadly / AltStore

            See `README.md` and `ROADMAP.md` for status.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
