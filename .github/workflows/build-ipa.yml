name: Build Unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Use latest available Xcode
          ls /Applications/Xcode*.app -d 2>/dev/null || true
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: Resolve scheme name
        id: scheme
        run: |
          SCHEME=$(xcodebuild -project ios-cloudfare-tunnel.xcodeproj -list 2>/dev/null \
            | grep -A20 'Schemes:' | grep -v 'Schemes:' | head -1 | xargs)
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT
          echo "Detected scheme: $SCHEME"

      - name: Build archive (no signing)
        run: |
          xcodebuild \
            -project ios-cloudfare-tunnel.xcodeproj \
            -scheme "${{ steps.scheme.outputs.scheme }}" \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath $RUNNER_TEMP/app.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=NO \
            archive

      - name: Package unsigned IPA
        run: |
          APP_PATH=$(find $RUNNER_TEMP/app.xcarchive -name "*.app" | head -1)
          echo "App: $APP_PATH"
          mkdir -p $RUNNER_TEMP/ipa/Payload
          cp -r "$APP_PATH" $RUNNER_TEMP/ipa/Payload/
          cd $RUNNER_TEMP/ipa
          zip -qr ../CloudfareTunnel-unsigned.ipa Payload
          echo "IPA size: $(du -sh ../CloudfareTunnel-unsigned.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CloudfareTunnel-unsigned
          path: ${{ runner.temp }}/CloudfareTunnel-unsigned.ipa
          retention-days: 30
