name: Build Unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14  # Xcode 15, Apple Silicon

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build (no signing)
        run: |
          xcodebuild \
            -project ios-cloudfare-tunnel.xcodeproj \
            -scheme ios-cloudfare-tunnel \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath $RUNNER_TEMP/app.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Package IPA (unsigned)
        run: |
          mkdir -p $RUNNER_TEMP/ipa/Payload
          cp -r $RUNNER_TEMP/app.xcarchive/Products/Applications/*.app \
            $RUNNER_TEMP/ipa/Payload/
          cd $RUNNER_TEMP/ipa
          zip -r ../CloudfareTunnel-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: CloudfareTunnel-unsigned
          path: ${{ runner.temp }}/CloudfareTunnel-unsigned.ipa
          retention-days: 30
